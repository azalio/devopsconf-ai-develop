# This rule is not used by the project project-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over platform.example.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-operator
    app.kubernetes.io/managed-by: kustomize
  name: projectaccessbinding-admin-role
rules:
- apiGroups:
  - platform.example.io
  resources:
  - projectaccessbindings
  verbs:
  - '*'
- apiGroups:
  - platform.example.io
  resources:
  - projectaccessbindings/status
  verbs:
  - get
