---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - platform.example.io
  resources:
  - projectaccessbindings
  - projectroles
  - projects
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - platform.example.io
  resources:
  - projectaccessbindings/finalizers
  - projectroles/finalizers
  - projects/finalizers
  verbs:
  - update
- apiGroups:
  - platform.example.io
  resources:
  - projectaccessbindings/status
  - projectroles/status
  - projects/status
  verbs:
  - get
  - patch
  - update
